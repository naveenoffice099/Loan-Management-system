<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Loan Manager">
    <meta name="theme-color" content="#667eea">
    <title>💰 Loan Manager - Professional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
            position: fixed;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* AUTH CONTAINER */
        .auth-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            display: none;
        }

        .auth-container.active {
            display: flex;
        }

        .auth-box {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.5s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-box h2 {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-size: 1.8em;
            font-weight: 700;
        }

        .auth-subtitle {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .auth-form-group {
            margin-bottom: 16px;
        }

        .auth-form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #2d3748;
            font-size: 0.92em;
        }

        .auth-form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e7ff;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .auth-form-group input:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f8f9ff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .auth-btn:active {
            transform: scale(0.98);
        }

        .auth-toggle {
            text-align: center;
            margin-top: 16px;
            color: #666;
            font-size: 0.9em;
        }

        .auth-toggle a {
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
            font-weight: 600;
        }

        .auth-links {
            text-align: center;
            margin-top: 12px;
            font-size: 0.85em;
        }

        .auth-links a {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            margin: 0 5px;
        }

        #authMessage {
            text-align: center;
            margin-bottom: 16px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 500;
            display: none;
        }

        #authMessage.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        #authMessage.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        /* FORM SECTIONS */
        .auth-form-section {
            display: none;
        }

        .auth-form-section.active {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 12px;
            font-size: 0.85em;
        }

        .back-link a {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        /* MAIN APP STYLES */
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 0;
            display: none;
        }

        .container.active {
            display: flex;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 18px 20px;
            text-align: center;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-content {
            flex: 1;
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.6em;
            margin-bottom: 2px;
            font-weight: 700;
        }
        
        .header p {
            font-size: 0.8em;
            opacity: 0.95;
            font-weight: 500;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-name {
            font-size: 0.85em;
            font-weight: 600;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:active {
            background: rgba(255,255,255,0.3);
        }
        
        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 2px solid #e0e0e0;
            flex-shrink: 0;
            gap: 0;
            overflow-x: auto;
        }
        
        .tabs button {
            flex: 1;
            padding: 13px 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            min-width: 80px;
            white-space: nowrap;
        }
        
        .tabs button.active {
            background: white;
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tabs button:active {
            background: #f9f9f9;
        }
        
        .content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
            padding-bottom: 65px;
        }
        
        .content::-webkit-scrollbar {
            width: 6px;
        }
        
        .content::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        .content::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #2d3748;
            font-size: 0.92em;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e7ff;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-color: white;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f8f9ff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 120px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-warning {
            background: #ffc107;
            color: #333;
        }
        
        .btn-small {
            padding: 10px 12px;
            font-size: 0.85em;
            flex: none;
        }
        
        .alert {
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 15px;
            animation: slideIn 0.3s;
            font-weight: 500;
        }
        
        @keyframes slideIn {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loan-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f7ff 100%);
            border: 2px solid #e0e7ff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 14px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
        }
        
        .loan-card:active {
            border-color: #667eea;
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.25);
            transform: translateY(-2px);
        }
        
        .loan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }
        
        .loan-name {
            font-weight: 700;
            color: #2d3748;
            font-size: 1.08em;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .status-badge {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.75em;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .status-active {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
        }
        
        .status-closed {
            background: linear-gradient(135deg, #e2e3e5 0%, #d3d4d6 100%);
            color: #383d41;
        }

        .status-pending {
            background: linear-gradient(135deg, #fff3cd 0%, #ffeaa7 100%);
            color: #856404;
        }

        .status-overdue {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
        }
        
        .loan-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 0.85em;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            background: white;
            padding: 10px;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }
        
        .info-label {
            color: #667eea;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .info-value {
            color: #2d3748;
            font-weight: 700;
            margin-top: 4px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .empty-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .empty-text {
            font-size: 1em;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .details-section {
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 1.05em;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .payment-item {
            background: white;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.1);
            transition: all 0.3s;
        }

        .payment-item.paid {
            background: #e8f5e9;
            border-left-color: #28a745;
            opacity: 0.7;
        }

        .payment-item.paid .payment-checkbox {
            accent-color: #28a745;
        }

        .payment-item.overdue {
            background: #ffebee;
            border-left-color: #dc3545;
        }
        
        .payment-info {
            flex: 1;
        }
        
        .payment-month {
            font-weight: 700;
            color: #2d3748;
            font-size: 0.95em;
        }

        .payment-item.paid .payment-month {
            text-decoration: line-through;
            color: #999;
        }
        
        .payment-amount {
            font-size: 0.85em;
            color: #667eea;
            margin-top: 3px;
            font-weight: 600;
        }
        
        .payment-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            flex-shrink: 0;
            accent-color: #667eea;
        }

        .payment-item.paid .payment-checkbox {
            cursor: not-allowed;
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .summary-label {
            font-size: 0.75em;
            opacity: 0.95;
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .summary-value {
            font-size: 1.2em;
            font-weight: 700;
        }
        
        .back-btn {
            background: linear-gradient(135deg, #6c757d 0%, #5a6268 100%);
            color: white;
            padding: 11px 16px;
            display: inline-block;
            margin-bottom: 16px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        
        .back-btn:active {
            transform: scale(0.95);
        }
        
        .details-view {
            display: none;
        }
        
        .details-view.active {
            display: block;
        }

        .payment-view {
            display: none;
        }

        .payment-view.active {
            display: block;
        }

        .edit-view {
            display: none;
        }

        .edit-view.active {
            display: block;
        }
        
        .calculation-box {
            background: linear-gradient(135deg, #f0f7ff 0%, #e8f4fd 100%);
            border: 2px solid #667eea;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .calculation-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e0e7ff;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .calculation-item:last-child {
            border-bottom: none;
        }
        
        .calculation-label {
            color: #2d3748;
            font-weight: 600;
            font-size: 0.92em;
            flex: 1;
            min-width: 150px;
        }
        
        .calculation-value {
            color: #667eea;
            font-weight: 700;
            font-size: 1.05em;
        }
        
        .total-amount {
            color: #28a745;
            font-size: 1.15em;
        }
        
        .edit-mode {
            background: linear-gradient(135deg, #f0f7ff 0%, #e8f4fd 100%);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            border-left: 4px solid #667eea;
        }
        
        .info-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f7ff 100%);
            border-left: 4px solid #667eea;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
        }
        
        .info-card-title {
            font-weight: 700;
            color: #667eea;
            margin-bottom: 6px;
            font-size: 0.95em;
        }
        
        .info-card-desc {
            font-size: 0.85em;
            color: #555;
            line-height: 1.5;
        }

        h3 {
            margin-bottom: 16px;
            font-size: 1.15em;
            font-weight: 700;
            color: #2d3748;
        }

        .edit-btn, .delete-btn, .pdf-btn, .whatsapp-btn {
            background: #667eea;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            border: none;
            font-size: 0.8em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .delete-btn {
            background: #dc3545;
        }

        .pdf-btn {
            background: #28a745;
        }

        .whatsapp-btn {
            background: #25d366;
        }

        .edit-btn:active, .delete-btn:active, .pdf-btn:active, .whatsapp-btn:active {
            transform: scale(0.95);
        }

        .payment-stats {
            background: linear-gradient(135deg, #f0f7ff 0%, #e8f4fd 100%);
            border: 2px solid #667eea;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e0e7ff;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-weight: 600;
            color: #2d3748;
        }

        .stat-value {
            font-weight: 700;
            color: #667eea;
            font-size: 1.1em;
        }

        .principal-section {
            background: linear-gradient(135deg, #f0f7ff 0%, #e8f4fd 100%);
            border: 2px solid #667eea;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .principal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e0e7ff;
        }

        .principal-item:last-child {
            border-bottom: none;
        }

        .principal-label {
            color: #2d3748;
            font-weight: 600;
        }

        .principal-value {
            color: #28a745;
            font-weight: 700;
            font-size: 1.1em;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 1.3em;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 16px;
        }

        .modal-form-group {
            margin-bottom: 16px;
        }

        .modal-form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #2d3748;
            font-size: 0.92em;
        }

        .modal-form-group input, .modal-form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e7ff;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .modal-form-group input:focus, .modal-form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f8f9ff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn.save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .modal-btn.cancel {
            background: #e0e0e0;
            color: #333;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .edit-payment-item {
            background: white;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.1);
        }

        .edit-payment-item.paid {
            background: #e8f5e9;
            border-left-color: #28a745;
        }

        .edit-payment-item.overdue {
            background: #ffebee;
            border-left-color: #dc3545;
        }

        @media print {
            body {
                background: white;
            }
            .header, .tabs, .button-group, .edit-btn, .delete-btn, .pdf-btn {
                display: none !important;
            }
            .content {
                padding: 0;
                padding-bottom: 0;
                overflow: visible;
            }
        }
    </style>
</head>
<body>
    <!-- AUTH CONTAINER -->
    <div id="authContainer" class="auth-container active">
        <div class="auth-box">
            <h2>💰 Loan Manager</h2>
            <p class="auth-subtitle">Manage your loans efficiently</p>
            
            <div id="authMessage"></div>

            <!-- Login Section -->
            <div id="loginSection" class="auth-form-section active">
                <div class="auth-form-group">
                    <label>📧 Email</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email">
                </div>
                <div class="auth-form-group">
                    <label>🔐 Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password">
                </div>
                <button class="auth-btn" onclick="login()">Login</button>
                <p class="auth-toggle">Don't have account? <a onclick="toggleAuth()">Register</a></p>
            </div>

            <!-- Register Section -->
            <div id="registerSection" class="auth-form-section">
                <div class="auth-form-group">
                    <label>👤 Full Name</label>
                    <input type="text" id="registerName" placeholder="Enter your name">
                </div>
                <div class="auth-form-group">
                    <label>📧 Email</label>
                    <input type="email" id="registerEmail" placeholder="Enter your email">
                </div>
                <div class="auth-form-group">
                    <label>📱 Phone Number</label>
                    <input type="tel" id="registerPhone" placeholder="Enter phone number">
                </div>
                <div class="auth-form-group">
                    <label>🔐 Password</label>
                    <input type="password" id="registerPassword" placeholder="Enter password">
                </div>
                <button class="auth-btn" onclick="register()">Register</button>
                <p class="auth-toggle">Already have account? <a onclick="toggleAuth()">Login</a></p>
            </div>
        </div>
    </div>

    <!-- MAIN CONTAINER -->
    <div id="container" class="container">
        <!-- HEADER -->
        <div class="header">
            <div></div>
            <div class="header-content">
                <h1>💰 Loan Manager</h1>
                <p>Professional Loan Tracking</p>
            </div>
            <div class="user-section">
                <span class="user-name" id="userName">User</span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('loans')">📋 Loans</button>
            <button class="tab-btn" onclick="switchTab('add')">➕ Add Loan</button>
            <button class="tab-btn" onclick="switchTab('dashboard')">📊 Dashboard</button>
        </div>

        <!-- CONTENT -->
        <div class="content">
            <!-- LOANS TAB -->
            <div id="loansTab" class="tab-content active">
                <!-- LIST VIEW -->
                <div class="loans-list-view" id="loansListView">
                    <div id="loansList"></div>
                </div>

                <!-- DETAILS VIEW -->
                <div class="details-view" id="detailsView">
                    <button class="back-btn" onclick="backToList()">← Back to Loans</button>
                    
                    <div id="loanDetails"></div>

                    <div style="margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
                        <button class="pdf-btn" onclick="exportPDF()">📄 Export PDF</button>
                        <button class="edit-btn" onclick="showEditView()">✏️ Edit</button>
                        <button class="delete-btn" onclick="deleteLoan()">🗑️ Delete</button>
                    </div>
                </div>

                <!-- EDIT VIEW -->
                <div class="edit-view" id="editView">
                    <button class="back-btn" onclick="backToDetails()">← Back</button>
                    
                    <h3>Edit Loan Details</h3>
                    
                    <div class="edit-mode">
                        <div class="form-group">
                            <label>Loan Name</label>
                            <input type="text" id="editLoanName" placeholder="e.g., Car Loan">
                        </div>
                        <div class="form-group">
                            <label>Borrower Name</label>
                            <input type="text" id="editBorrowerName" placeholder="Borrower name">
                        </div>
                        <div class="form-group">
                            <label>Principal Amount</label>
                            <input type="number" id="editPrincipal" placeholder="Amount">
                        </div>
                        <div class="form-group">
                            <label>Interest Rate (%)</label>
                            <input type="number" id="editRate" placeholder="Rate" step="0.01">
                        </div>
                        <div class="form-group">
                            <label>Loan Duration (Months)</label>
                            <input type="number" id="editDuration" placeholder="Months">
                        </div>
                        <div class="form-group">
                            <label>Start Date</label>
                            <input type="date" id="editStartDate">
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select id="editStatus">
                                <option value="active">Active</option>
                                <option value="closed">Closed</option>
                                <option value="pending">Pending</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Notes</label>
                            <textarea id="editNotes" placeholder="Additional notes"></textarea>
                        </div>
                    </div>

                    <h3>💳 Payment Schedule - Edit</h3>
                    <p style="color: #666; font-size: 0.9em; margin-bottom: 15px;">Check or uncheck payments as needed:</p>
                    <div id="editPaymentSchedule"></div>

                    <div class="button-group">
                        <button class="btn-primary" onclick="saveEditedLoan()">💾 Save Changes</button>
                    </div>
                </div>
            </div>

            <!-- ADD LOAN TAB -->
            <div id="addTab" class="tab-content">
                <h3>Add New Loan</h3>
                
                <div class="form-group">
                    <label>💳 Loan Name</label>
                    <input type="text" id="loanName" placeholder="e.g., Car Loan, Personal Loan">
                </div>
                
                <div class="form-group">
                    <label>👤 Borrower Name</label>
                    <input type="text" id="borrowerName" placeholder="Full name of borrower">
                </div>
                
                <div class="form-group">
                    <label>💰 Principal Amount</label>
                    <input type="number" id="principal" placeholder="Loan amount" min="0" step="0.01">
                </div>
                
                <div class="form-group">
                    <label>📈 Annual Interest Rate (%)</label>
                    <input type="number" id="rate" placeholder="e.g., 8.5" min="0" step="0.01">
                </div>
                
                <div class="form-group">
                    <label>📅 Loan Duration (Months)</label>
                    <input type="number" id="duration" placeholder="e.g., 24" min="1">
                </div>
                
                <div class="form-group">
                    <label>📆 Start Date</label>
                    <input type="date" id="startDate">
                </div>
                
                <div class="form-group">
                    <label>📝 Notes (Optional)</label>
                    <textarea id="notes" placeholder="Add any notes about the loan"></textarea>
                </div>
                
                <div class="button-group">
                    <button class="btn-primary" onclick="addLoan()">➕ Create Loan</button>
                    <button class="btn-secondary" onclick="clearForm()">🔄 Clear</button>
                </div>
            </div>

            <!-- DASHBOARD TAB -->
            <div id="dashboardTab" class="tab-content">
                <h3>📊 Dashboard</h3>
                
                <div id="dashboardContent"></div>
            </div>
        </div>
    </div>

    <script>
        // ========== DATA MANAGEMENT ==========
        const DB_KEY = 'loanManagerDB';
        const AUTH_KEY = 'loanManagerAuth';

        function getCurrentUser() {
            const auth = localStorage.getItem(AUTH_KEY);
            return auth ? JSON.parse(auth) : null;
        }

        function getDatabase() {
            const user = getCurrentUser();
            if (!user) return { loans: [] };
            const db = localStorage.getItem(DB_KEY + '_' + user.email);
            return db ? JSON.parse(db) : { loans: [] };
        }

        function saveDatabase(db) {
            const user = getCurrentUser();
            if (user) {
                localStorage.setItem(DB_KEY + '_' + user.email, JSON.stringify(db));
            }
        }

        // ========== AUTHENTICATION ==========
        function toggleAuth() {
            document.getElementById('loginSection').classList.toggle('active');
            document.getElementById('registerSection').classList.toggle('active');
            clearAuthMessage();
        }

        function showAuthMessage(message, type) {
            const msgEl = document.getElementById('authMessage');
            msgEl.textContent = message;
            msgEl.className = type;
        }

        function clearAuthMessage() {
            const msgEl = document.getElementById('authMessage');
            msgEl.textContent = '';
            msgEl.className = '';
        }

        function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!email || !password) {
                showAuthMessage('⚠️ Please fill all fields', 'error');
                return;
            }

            const users = JSON.parse(localStorage.getItem('loanManagerUsers') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                localStorage.setItem(AUTH_KEY, JSON.stringify({ email: user.email, name: user.name, phone: user.phone }));
                showApp();
            } else {
                showAuthMessage('❌ Invalid email or password', 'error');
            }
        }

        function register() {
            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const phone = document.getElementById('registerPhone').value.trim();
            const password = document.getElementById('registerPassword').value.trim();

            if (!name || !email || !phone || !password) {
                showAuthMessage('⚠️ Please fill all fields', 'error');
                return;
            }

            const users = JSON.parse(localStorage.getItem('loanManagerUsers') || '[]');
            if (users.find(u => u.email === email)) {
                showAuthMessage('❌ Email already registered', 'error');
                return;
            }

            users.push({ name, email, phone, password });
            localStorage.setItem('loanManagerUsers', JSON.stringify(users));
            showAuthMessage('✅ Registration successful! Please login.', 'success');
            
            setTimeout(() => {
                document.getElementById('registerEmail').value = email;
                toggleAuth();
            }, 1500);
        }

        function showApp() {
            document.getElementById('authContainer').classList.remove('active');
            document.getElementById('container').classList.add('active');
            updateUserName();
        }

        function logout() {
            localStorage.removeItem(AUTH_KEY);
            document.getElementById('authContainer').classList.add('active');
            document.getElementById('container').classList.remove('active');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function updateUserName() {
            const user = getCurrentUser();
            if (user) {
                document.getElementById('userName').textContent = user.name || 'User';
            }
        }

        // ========== LOAN MANAGEMENT ==========
        let currentLoanId = null;

        function addLoan() {
            const loanName = document.getElementById('loanName').value.trim();
            const borrowerName = document.getElementById('borrowerName').value.trim();
            const principal = parseFloat(document.getElementById('principal').value);
            const rate = parseFloat(document.getElementById('rate').value);
            const duration = parseInt(document.getElementById('duration').value);
            const startDate = document.getElementById('startDate').value;
            const notes = document.getElementById('notes').value.trim();

            if (!loanName || !borrowerName || !principal || !rate || !duration || !startDate) {
                alert('❌ Please fill all required fields');
                return;
            }

            const db = getDatabase();
            const loan = {
                id: Date.now(),
                loanName,
                borrowerName,
                principal,
                rate,
                duration,
                startDate,
                notes,
                status: 'active',
                payments: generatePaymentSchedule(principal, rate, duration, startDate),
                createdAt: new Date().toISOString()
            };

            db.loans.push(loan);
            saveDatabase(db);

            alert('✅ Loan added successfully!');
            clearForm();
            switchTab('loans');
            displayLoans();
        }

        function generatePaymentSchedule(principal, rate, duration, startDate) {
            const monthlyRate = rate / 12 / 100;
            const monthlyPayment = (principal * monthlyRate * Math.pow(1 + monthlyRate, duration)) / (Math.pow(1 + monthlyRate, duration) - 1);
            
            const payments = [];
            let date = new Date(startDate);
            let remainingBalance = principal;

            for (let i = 0; i < duration; i++) {
                const interest = remainingBalance * monthlyRate;
                const principalPayment = monthlyPayment - interest;
                remainingBalance -= principalPayment;

                payments.push({
                    month: i + 1,
                    dueDate: new Date(date).toISOString().split('T')[0],
                    amount: monthlyPayment,
                    paid: false,
                    interest,
                    principal: principalPayment
                });

                date.setMonth(date.getMonth() + 1);
            }

            return payments;
        }

        function clearForm() {
            document.getElementById('loanName').value = '';
            document.getElementById('borrowerName').value = '';
            document.getElementById('principal').value = '';
            document.getElementById('rate').value = '';
            document.getElementById('duration').value = '';
            document.getElementById('startDate').value = '';
            document.getElementById('notes').value = '';
        }

        function displayLoans() {
            const db = getDatabase();
            const loansList = document.getElementById('loansList');

            if (db.loans.length === 0) {
                loansList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-text">No loans yet</div>
                        <p style="color: #bbb; font-size: 0.9em;">Create your first loan to get started</p>
                    </div>
                `;
                return;
            }

            loansList.innerHTML = db.loans.map(loan => {
                const status = getPaymentStatus(loan);
                const totalPaid = loan.payments.filter(p => p.paid).reduce((sum, p) => sum + p.amount, 0);
                const progress = (totalPaid / (loan.principal * (1 + loan.rate / 100 / 12 * loan.duration))) * 100;

                return `
                    <div class="loan-card" onclick="showLoanDetails('${loan.id}')">
                        <div class="loan-header">
                            <div class="loan-name">${loan.loanName}</div>
                            <div class="status-badge status-${status}">${status.toUpperCase()}</div>
                        </div>
                        <div class="loan-info">
                            <div class="info-item">
                                <div class="info-label">Borrower</div>
                                <div class="info-value">${loan.borrowerName}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Amount</div>
                                <div class="info-value">₹${loan.principal.toLocaleString()}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Duration</div>
                                <div class="info-value">${loan.duration} months</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Interest Rate</div>
                                <div class="info-value">${loan.rate}%</div>
                            </div>
                        </div>
                        <div style="margin-top: 10px;">
                            <div style="font-size: 0.75em; color: #999; margin-bottom: 5px;">Progress</div>
                            <div style="background: #e0e0e0; height: 6px; border-radius: 3px; overflow: hidden;">
                                <div style="background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; width: ${Math.min(progress, 100)}%; transition: width 0.3s;"></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getPaymentStatus(loan) {
            const today = new Date().toISOString().split('T')[0];
            const paidCount = loan.payments.filter(p => p.paid).length;
            
            if (paidCount === loan.payments.length) return 'closed';
            
            const overduePayment = loan.payments.find(p => !p.paid && p.dueDate < today);
            if (overduePayment) return 'overdue';
            
            const pendingPayment = loan.payments.find(p => !p.paid && p.dueDate === today);
            if (pendingPayment) return 'pending';
            
            return 'active';
        }

        function showLoanDetails(loanId) {
            const db = getDatabase();
            const loan = db.loans.find(l => l.id === parseInt(loanId));
            
            if (!loan) return;

            currentLoanId = loan.id;
            const loansList = document.getElementById('loansListView');
            const detailsView = document.getElementById('detailsView');
            
            loansList.style.display = 'none';
            detailsView.classList.add('active');

            const totalPayment = loan.payments.reduce((sum, p) => sum + p.amount, 0);
            const totalPaid = loan.payments.filter(p => p.paid).reduce((sum, p) => sum + p.amount, 0);
            const totalPending = totalPayment - totalPaid;
            const paidCount = loan.payments.filter(p => p.paid).length;

            const detailsHTML = `
                <h3>${loan.loanName}</h3>

                <div class="payment-stats">
                    <div class="stat-item">
                        <span class="stat-label">Borrower</span>
                        <span class="stat-value">${loan.borrowerName}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Start Date</span>
                        <span class="stat-value">${new Date(loan.startDate).toLocaleDateString()}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Status</span>
                        <span class="stat-value" style="color: ${getStatusColor(getPaymentStatus(loan))};">${getPaymentStatus(loan).toUpperCase()}</span>
                    </div>
                </div>

                <div class="calculation-box">
                    <div class="calculation-item">
                        <span class="calculation-label">Principal Amount</span>
                        <span class="calculation-value">₹${loan.principal.toLocaleString()}</span>
                    </div>
                    <div class="calculation-item">
                        <span class="calculation-label">Interest Rate</span>
                        <span class="calculation-value">${loan.rate}% p.a.</span>
                    </div>
                    <div class="calculation-item">
                        <span class="calculation-label">Total Interest</span>
                        <span class="calculation-value">₹${(totalPayment - loan.principal).toLocaleString('en-IN', {maximumFractionDigits: 2})}</span>
                    </div>
                    <div class="calculation-item">
                        <span class="calculation-label">Monthly Payment</span>
                        <span class="calculation-value">₹${(totalPayment / loan.duration).toLocaleString('en-IN', {maximumFractionDigits: 2})}</span>
                    </div>
                    <div class="calculation-item">
                        <span class="calculation-label calculation-value total-amount">Total Payable</span>
                        <span class="calculation-value total-amount">₹${totalPayment.toLocaleString('en-IN', {maximumFractionDigits: 2})}</span>
                    </div>
                </div>

                <div class="payment-stats">
                    <div class="stat-item">
                        <span class="stat-label">Total Paid</span>
                        <span class="stat-value" style="color: #28a745;">₹${totalPaid.toLocaleString('en-IN', {maximumFractionDigits: 2})}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Remaining</span>
                        <span class="stat-value" style="color: #ffc107;">₹${totalPending.toLocaleString('en-IN', {maximumFractionDigits: 2})}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Payments Done</span>
                        <span class="stat-value">${paidCount} / ${loan.payments.length}</span>
                    </div>
                </div>

                <h3 style="margin-top: 20px;">Payment Schedule</h3>
                <div>
                    ${loan.payments.map((payment, index) => {
                        const today = new Date().toISOString().split('T')[0];
                        const isOverdue = !payment.paid && payment.dueDate < today;
                        const isPaid = payment.paid;
                        const className = isPaid ? 'paid' : isOverdue ? 'overdue' : '';
                        
                        return `
                            <div class="payment-item ${className}">
                                <div class="payment-info">
                                    <div class="payment-month">Month ${payment.month}</div>
                                    <div class="payment-amount">Due: ${new Date(payment.dueDate).toLocaleDateString()}</div>
                                    <div class="payment-amount">Amount: ₹${payment.amount.toLocaleString('en-IN', {maximumFractionDigits: 2})}</div>
                                </div>
                                <input type="checkbox" class="payment-checkbox" ${isPaid ? 'checked disabled' : ''} onchange="togglePayment(${loan.id}, ${payment.month - 1}, this.checked)">
                            </div>
                        `;
                    }).join('')}
                </div>

                ${loan.notes ? `
                    <div class="info-card" style="margin-top: 20px;">
                        <div class="info-card-title">📝 Notes</div>
                        <div class="info-card-desc">${loan.notes}</div>
                    </div>
                ` : ''}
            `;

            document.getElementById('loanDetails').innerHTML = detailsHTML;
        }

        function getStatusColor(status) {
            const colors = { active: '#667eea', closed: '#999', pending: '#ffc107', overdue: '#dc3545' };
            return colors[status] || '#667eea';
        }

        function backToList() {
            document.getElementById('loansListView').style.display = 'block';
            document.getElementById('detailsView').classList.remove('active');
            currentLoanId = null;
        }

        function showEditView() {
            const db = getDatabase();
            const loan = db.loans.find(l => l.id === currentLoanId);
            if (!loan) return;

            document.getElementById('detailsView').classList.remove('active');
            document.getElementById('editView').classList.add('active');

            document.getElementById('editLoanName').value = loan.loanName;
            document.getElementById('editBorrowerName').value = loan.borrowerName;
            document.getElementById('editPrincipal').value = loan.principal;
            document.getElementById('editRate').value = loan.rate;
            document.getElementById('editDuration').value = loan.duration;
            document.getElementById('editStartDate').value = loan.startDate;
            document.getElementById('editStatus').value = loan.status;
            document.getElementById('editNotes').value = loan.notes || '';

            displayEditPaymentSchedule(loan);
        }

        function displayEditPaymentSchedule(loan) {
            const scheduleDiv = document.getElementById('editPaymentSchedule');
            
            scheduleDiv.innerHTML = loan.payments.map((payment, index) => {
                const today = new Date().toISOString().split('T')[0];
                const isOverdue = !payment.paid && payment.dueDate < today;
                const isPaid = payment.paid;
                const className = isPaid ? 'paid' : isOverdue ? 'overdue' : '';
                
                return `
                    <div class="edit-payment-item ${className}">
                        <div class="payment-info">
                            <div class="payment-month">Month ${payment.month}</div>
                            <div class="payment-amount">Due: ${new Date(payment.dueDate).toLocaleDateString()}</div>
                            <div class="payment-amount">Amount: ₹${payment.amount.toLocaleString('en-IN', {maximumFractionDigits: 2})}</div>
                        </div>
                        <input type="checkbox" class="payment-checkbox" id="editPayment_${index}" ${isPaid ? 'checked' : ''}>
                    </div>
                `;
            }).join('');
        }

        function backToDetails() {
            document.getElementById('editView').classList.remove('active');
            document.getElementById('detailsView').classList.add('active');
        }

        function saveEditedLoan() {
            const db = getDatabase();
            const loanIndex = db.loans.findIndex(l => l.id === currentLoanId);
            
            if (loanIndex === -1) return;

            const loan = db.loans[loanIndex];

            loan.loanName = document.getElementById('editLoanName').value;
            loan.borrowerName = document.getElementById('editBorrowerName').value;
            loan.principal = parseFloat(document.getElementById('editPrincipal').value);
            loan.rate = parseFloat(document.getElementById('editRate').value);
            loan.duration = parseInt(document.getElementById('editDuration').value);
            loan.startDate = document.getElementById('editStartDate').value;
            loan.status = document.getElementById('editStatus').value;
            loan.notes = document.getElementById('editNotes').value;

            // Update payment statuses from checkboxes
            loan.payments.forEach((payment, index) => {
                const checkbox = document.getElementById(`editPayment_${index}`);
                if (checkbox) {
                    payment.paid = checkbox.checked;
                }
            });

            db.loans[loanIndex] = loan;
            saveDatabase(db);

            alert('✅ Loan updated successfully!');
            backToDetails();
            showLoanDetails(currentLoanId.toString());
        }

        function togglePayment(loanId, paymentIndex, isPaid) {
            const db = getDatabase();
            const loan = db.loans.find(l => l.id === loanId);
            
            if (loan && loan.payments[paymentIndex]) {
                loan.payments[paymentIndex].paid = isPaid;
                saveDatabase(db);
                showLoanDetails(loanId.toString());
            }
        }

        function deleteLoan() {
            if (!confirm('🗑️ Are you sure you want to delete this loan? This action cannot be undone.')) {
                return;
            }

            const db = getDatabase();
            db.loans = db.loans.filter(l => l.id !== currentLoanId);
            saveDatabase(db);

            alert('✅ Loan deleted successfully!');
            backToList();
            displayLoans();
        }

        function exportPDF() {
            const db = getDatabase();
            const loan = db.loans.find(l => l.id === currentLoanId);
            
            if (!loan) return;

            const totalPayment = loan.payments.reduce((sum, p) => sum + p.amount, 0);
            const totalPaid = loan.payments.filter(p => p.paid).reduce((sum, p) => sum + p.amount, 0);

            let htmlContent = `
                <html>
                <head>
                    <meta charset="UTF-8">
                    <style>
                        body { font-family: Arial, sans-serif; padding: 20px; color: #333; }
                        .header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid #667eea; padding-bottom: 15px; }
                        .header h1 { color: #667eea; margin: 0; font-size: 28px; }
                        .header p { color: #666; margin: 5px 0; }
                        .section { margin-bottom: 25px; }
                        .section-title { background: #667eea; color: white; padding: 12px 15px; margin-bottom: 15px; font-weight: bold; border-radius: 5px; }
                        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
                        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
                        th { background: #f5f5f5; font-weight: bold; color: #333; }
                        .summary { display: flex; justify-content: space-between; margin-top: 15px; }
                        .summary-item { flex: 1; padding: 15px; background: #f9f9f9; margin-right: 10px; border-radius: 5px; border-left: 4px solid #667eea; }
                        .summary-item:last-child { margin-right: 0; }
                        .paid { color: #28a745; font-weight: bold; }
                        .overdue { color: #dc3545; }
                        .total { font-weight: bold; }
                        .label { color: #666; font-size: 12px; }
                        .value { font-size: 18px; font-weight: bold; color: #667eea; margin-top: 5px; }
                        p { line-height: 1.8; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <h1>💰 Loan Statement</h1>
                        <p>Generated on ${new Date().toLocaleDateString('en-IN')}</p>
                    </div>

                    <div class="section">
                        <div class="section-title">Loan Details</div>
                        <p><strong>Loan Name:</strong> ${loan.loanName}</p>
                        <p><strong>Borrower Name:</strong> ${loan.borrowerName}</p>
                        <p><strong>Principal Amount:</strong> ₹${loan.principal.toLocaleString('en-IN')}</p>
                        <p><strong>Interest Rate:</strong> ${loan.rate}% p.a.</p>
                        <p><strong>Loan Duration:</strong> ${loan.duration} months</p>
                        <p><strong>Start Date:</strong> ${new Date(loan.startDate).toLocaleDateString('en-IN')}</p>
                        <p><strong>Status:</strong> <span style="color: ${getStatusColor(getPaymentStatus(loan))};">${loan.status.toUpperCase()}</span></p>
                    </div>

                    <div class="section">
                        <div class="section-title">Payment Summary</div>
                        <div class="summary">
                            <div class="summary-item">
                                <div class="label">Total Payable</div>
                                <div class="value">₹${totalPayment.toLocaleString('en-IN', {maximumFractionDigits: 2})}</div>
                            </div>
                            <div class="summary-item">
                                <div class="label">Total Paid</div>
                                <div class="value paid">₹${totalPaid.toLocaleString('en-IN', {maximumFractionDigits: 2})}</div>
                            </div>
                            <div class="summary-item">
                                <div class="label">Remaining Balance</div>
                                <div class="value">₹${(totalPayment - totalPaid).toLocaleString('en-IN', {maximumFractionDigits: 2})}</div>
                            </div>
                        </div>
                    </div>

                    <div class="section">
                        <div class="section-title">Payment Schedule</div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Month</th>
                                    <th>Due Date</th>
                                    <th>Principal</th>
                                    <th>Interest</th>
                                    <th>Payment Amount</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${loan.payments.map(payment => `
                                    <tr>
                                        <td>${payment.month}</td>
                                        <td>${new Date(payment.dueDate).toLocaleDateString('en-IN')}</td>
                                        <td>₹${payment.principal.toLocaleString('en-IN', {maximumFractionDigits: 2})}</td>
                                        <td>₹${payment.interest.toLocaleString('en-IN', {maximumFractionDigits: 2})}</td>
                                        <td>₹${payment.amount.toLocaleString('en-IN', {maximumFractionDigits: 2})}</td>
                                        <td class="${payment.paid ? 'paid' : 'overdue'}">${payment.paid ? '✅ Paid' : '⏳ Pending'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>

                    ${loan.notes ? `
                        <div class="section">
                            <div class="section-title">Additional Notes</div>
                            <p>${loan.notes}</p>
                        </div>
                    ` : ''}

                    <div style="margin-top: 40px; text-align: center; color: #999; font-size: 11px; border-top: 1px solid #ddd; padding-top: 20px;">
                        <p>This is a computer-generated statement. No signature required.<br>
                        Loan Manager © 2024. All rights reserved.</p>
                    </div>
                </body>
                </html>
            `;

            const opt = {
                margin: 10,
                filename: `${loan.loanName.replace(/\s+/g, '_')}_Statement_${new Date().toISOString().split('T')[0]}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };

            html2pdf().set(opt).from(htmlContent).save();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabName + 'Tab').classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'loans') {
                displayLoans();
            } else if (tabName === 'dashboard') {
                displayDashboard();
            }
        }

        function displayDashboard() {
            const db = getDatabase();
            
            if (db.loans.length === 0) {
                document.getElementById('dashboardContent').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📊</div>
                        <div class="empty-text">No data to display</div>
                    </div>
                `;
                return;
            }

            const totalLoans = db.loans.length;
            const activeLoans = db.loans.filter(l => l.status === 'active').length;
            const closedLoans = db.loans.filter(l => l.status === 'closed').length;
            
            let totalPrincipal = 0;
            let totalPaid = 0;
            let totalPayable = 0;

            db.loans.forEach(loan => {
                totalPrincipal += loan.principal;
                const paymentTotal = loan.payments.reduce((sum, p) => sum + p.amount, 0);
                totalPayable += paymentTotal;
                totalPaid += loan.payments.filter(p => p.paid).reduce((sum, p) => sum + p.amount, 0);
            });

            const dashboardHTML = `
                <div class="summary-grid">
                    <div class="summary-card">
                        <div class="summary-label">Total Loans</div>
                        <div class="summary-value">${totalLoans}</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">Active</div>
                        <div class="summary-value">${activeLoans}</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">Closed</div>
                        <div class="summary-value">${closedLoans}</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">Total Principal</div>
                        <div class="summary-value">₹${(totalPrincipal / 100000).toFixed(1)}L</div>
                    </div>
                </div>

                <div class="calculation-box">
                    <div class="calculation-item">
                        <span class="calculation-label">Total Payable</span>
                        <span class="calculation-value">₹${totalPayable.toLocaleString('en-IN', {maximumFractionDigits: 0})}</span>
                    </div>
                    <div class="calculation-item">
                        <span class="calculation-label">Total Paid</span>
                        <span class="calculation-value" style="color: #28a745;">₹${totalPaid.toLocaleString('en-IN', {maximumFractionDigits: 0})}</span>
                    </div>
                    <div class="calculation-item">
                        <span class="calculation-label">Total Remaining</span>
                        <span class="calculation-value" style="color: #ffc107;">₹${(totalPayable - totalPaid).toLocaleString('en-IN', {maximumFractionDigits: 0})}</span>
                    </div>
                    <div class="calculation-item">
                        <span class="calculation-label">Recovery %</span>
                        <span class="calculation-value">${((totalPaid / totalPayable) * 100).toFixed(1)}%</span>
                    </div>
                </div>

                <h3>Loan Breakdown</h3>
                <div class="principal-section">
                    ${db.loans.map(loan => {
                        const paidCount = loan.payments.filter(p => p.paid).length;
                        const totalPayment = loan.payments.reduce((sum, p) => sum + p.amount, 0);
                        
                        return `
                            <div class="principal-item">
                                <span class="principal-label">${loan.loanName}</span>
                                <span class="principal-value">${paidCount}/${loan.duration} months</span>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;

            document.getElementById('dashboardContent').innerHTML = dashboardHTML;
        }

        // Initial load
        window.addEventListener('load', () => {
            const user = getCurrentUser();
            if (user) {
                showApp();
                displayLoans();
            }
        });
    </script>
</body>
</html>
